<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Insights | Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    
    <div class="auth-bg">
        <img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=2000&auto=format&fit=crop" alt="Stadium">
    </div>

    <div class="auth-container">
        
        <a href="index.html" class="back-link">&larr; Back to Home</a>

        <div class="auth-card">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h2>Welcome <span class="highlight">Back</span></h2>
            </div>
            
            <p class="subtitle">Log in to view your personalized analytics and live predictions.</p>

            <form id="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email-input" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password-input" placeholder="••••••••" required>
                </div>
                
                <div class="auth-actions">
                    <label class="remember-me"><input type="checkbox"> Remember me</label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" id="login-btn" class="auth-btn">Log In</button>
                <p id="error-msg" style="color:#ff5f6d;text-align:center;margin-top:12px;font-size:14px;min-height:20px;"></p>
            </form>

            <p class="switch-auth">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ioymvfarpsjuugorxznw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlveW12ZmFycHNqdXVnb3J4em53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDEwNTAsImV4cCI6MjA5MDA3NzA1MH0.CgMyc3y8YikKveP9WyiotELrfGqEjzr6rMG3eBMRA_w';

        const form    = document.getElementById('login-form');
        const btn     = document.getElementById('login-btn');
        const errMsg  = document.getElementById('error-msg');

        function showError(msg) {
            errMsg.innerText = msg;
            btn.innerText = 'Log In';
            btn.disabled = false;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email    = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;

            errMsg.innerText = '';
            btn.innerText = 'Verifying...';
            btn.disabled = true;

            try {
                const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    const msg = data.error_description || data.msg || data.error || 'Invalid email or password.';
                    showError('❌ ' + msg);
                    return;
                }

                if (!data.access_token) {
                    showError('❌ Login failed — no session returned. Try again.');
                    return;
                }

                // Save session to localStorage
                localStorage.setItem('ipl_access_token', data.access_token);
                localStorage.setItem('ipl_refresh_token', data.refresh_token || '');
                localStorage.setItem('ipl_user', JSON.stringify(data.user));

                btn.innerText = 'Welcome! Loading...';
                window.location.href = 'dashboard.html';

            } catch (err) {
                showError('❌ Network error: ' + err.message);
            }
        });
    </script>
</body>
</html>
